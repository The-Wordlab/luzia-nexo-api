site_name: Luzia Nexo API
site_description: Agent Runtime integration docs and deployable examples
site_url: https://the-wordlab.github.io/luzia-nexo-api/
repo_url: https://github.com/The-Wordlab/luzia-nexo-api
repo_name: The-Wordlab/luzia-nexo-api
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/nexo-octopus-icon.png
  favicon: assets/nexo-octopus-icon.png
  features:
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

extra_css:
  - stylesheets/brand.css

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API Reference: partner-api-reference.md
  - Micro Apps API: micro-apps-api.md
  - MCP Server: mcp.md
  - "Tutorial: Create App from Terminal": tutorial-create-app-from-terminal.md
  - Internal Apps: internal-apps.md
  - GCP Deploy Playbook: gcp-deploy-playbook.md
  - Hosting (Optional): hosting.md
  - Demo Catalog: demos.md
  - Examples Showcase: examples-showcase.md
  - Live Streaming Architecture (Advanced): design-live-streaming.md
  - Agent Interop (MCP & A2A): agent-interop.md
