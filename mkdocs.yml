site_name: Nexo Integration
site_description: Nexo integration docs
site_url: https://the-wordlab.github.io/luzia-nexo-api/
repo_url: https://github.com/The-Wordlab/luzia-nexo-api
repo_name: The-Wordlab/luzia-nexo-api
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

extra_css:
  - stylesheets/brand.css

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API Reference: partner-api-reference.md
