# Cloud Build configuration for the football-live webhook example.
#
# Builds a Docker image, pushes it to Artifact Registry, and deploys to
# Cloud Run in a single pipeline.
#
# Required substitutions:
#   _PROJECT_ID      GCP project ID
#   _REGION          Cloud Run region, e.g. europe-west1
#   _SERVICE_NAME    Cloud Run service name, e.g. nexo-football-live
#   _AR_REPO         Artifact Registry repo name, e.g. nexo-examples
#
# Required Secret Manager secrets:
#   WEBHOOK_SECRET         Nexo HMAC signing secret
#   OPENAI_API_KEY         OpenAI API key (for LLM calls)
#   FOOTBALL_DATA_API_KEY  football-data.org API key

substitutions:
  _PROJECT_ID: ""
  _REGION: "europe-west1"
  _SERVICE_NAME: "nexo-football-live"
  _AR_REPO: "nexo-examples"
  _IMAGE_TAG: "$COMMIT_SHA"

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"
      - "."
    dir: "examples/webhook/football-live/python"

  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}"
    waitFor:
      - "build"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8003"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--timeout=60"
      - "--set-secrets=WEBHOOK_SECRET=WEBHOOK_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,FOOTBALL_DATA_API_KEY=FOOTBALL_DATA_API_KEY:latest"
      - "--set-env-vars=LLM_MODEL=openai/gpt-4o-mini,STREAMING_ENABLED=true,REFRESH_INTERVAL=300,TOP_K=5,CHROMA_PERSIST_DIR=/data/chroma,VECTOR_STORE_BACKEND=chroma,VECTOR_STORE_DURABLE=false"
    waitFor:
      - "push"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
