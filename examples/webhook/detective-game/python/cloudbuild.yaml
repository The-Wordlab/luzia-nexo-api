# Cloud Build configuration for the Sky Diamond webhook example.
#
# Builds a Docker image, pushes it to Artifact Registry, and deploys to
# Cloud Run in a single pipeline.
#
# Required substitutions:
#   _PROJECT_ID      GCP project ID
#   _REGION          Cloud Run region, e.g. europe-west1
#   _SERVICE_NAME    Cloud Run service name, e.g. luzia-sky-diamond
#   _AR_REPO         Artifact Registry repo name, e.g. nexo-examples
#
# Required Secret Manager secrets:
#   WEBHOOK_SECRET         Nexo HMAC signing secret
#   NEXO_PGVECTOR_DSN      Cloud SQL DSN for Postgres storage

substitutions:
  _PROJECT_ID: ""
  _REGION: "europe-west1"
  _SERVICE_NAME: "luzia-sky-diamond"
  _AR_REPO: "nexo-examples"
  _IMAGE_TAG: "manual"

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"
      - "."
    dir: "examples/webhook/detective-game/python"

  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}"
    waitFor:
      - "build"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--add-cloudsql-instances=${_PROJECT_ID}:${_REGION}:nexo-platform-pg"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--timeout=60"
      - "--set-secrets=WEBHOOK_SECRET=WEBHOOK_SECRET:latest,PGVECTOR_DSN=NEXO_PGVECTOR_DSN:latest"
    waitFor:
      - "push"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
