# Cloud Build configuration for the news-rag webhook example.
#
# Builds a Docker image, pushes it to Artifact Registry, and deploys to
# Cloud Run in a single pipeline.
#
# Required substitutions (set in Cloud Build trigger or via --substitutions):
#   _PROJECT_ID      GCP project ID
#   _REGION          Cloud Run region, e.g. us-central1
#   _SERVICE_NAME    Cloud Run service name, e.g. nexo-news-rag
#   _AR_REPO         Artifact Registry repo name, e.g. nexo-examples
#
# Required Secret Manager secrets (referenced in the deploy step):
#   WEBHOOK_SECRET         Nexo HMAC signing secret
#   OPENAI_API_KEY         OpenAI API key (if using OpenAI embeddings/LLM)
#
# Usage:
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions \
#       _PROJECT_ID=my-project,\
#       _REGION=us-central1,\
#       _SERVICE_NAME=nexo-news-rag,\
#       _AR_REPO=nexo-examples
#
# Or connect this directory to a Cloud Build trigger for CI/CD.

substitutions:
  _PROJECT_ID: ""
  _REGION: "us-central1"
  _SERVICE_NAME: "nexo-news-rag"
  _AR_REPO: "nexo-examples"
  _IMAGE_TAG: "$COMMIT_SHA"

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Build the Docker image
  # ---------------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"
      - "."
    dir: "examples/webhook/news-rag/python"

  # ---------------------------------------------------------------------------
  # Step 2: Push the image to Artifact Registry
  # ---------------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}"
    waitFor:
      - "build"

  # ---------------------------------------------------------------------------
  # Step 3: Deploy to Cloud Run
  # ---------------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--timeout=60"
      # Environment variables sourced from Secret Manager
      - "--set-secrets=WEBHOOK_SECRET=WEBHOOK_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest"
      # Non-secret configuration
      - "--set-env-vars=LLM_MODEL=openai/gpt-4o-mini,EMBEDDING_MODEL=text-embedding-3-small,REFRESH_INTERVAL_MINUTES=30,STREAMING_ENABLED=true,TOP_K=5"
    waitFor:
      - "push"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
