# Cloud Build configuration for the news-rag webhook example.
#
# Builds a Docker image and deploys it to Cloud Run.
#
# Required substitutions (set in Cloud Build trigger or pass via --substitutions):
#   _REGION         GCP region, e.g. europe-west1
#   _SERVICE_NAME   Cloud Run service name, e.g. nexo-news-rag
#   _PROJECT_ID     GCP project ID (defaults to $PROJECT_ID built-in)
#
# Secret Manager secrets referenced (create these before first deploy):
#   webhook-secret          Value of WEBHOOK_SECRET for HMAC validation
#   openai-api-key          OpenAI API key (required for OpenAI embeddings/LLMs)
#
# Cloud Run env vars that are NOT secrets are passed as --set-env-vars below.

substitutions:
  _REGION: europe-west1
  _SERVICE_NAME: nexo-news-rag
  _IMAGE: gcr.io/$PROJECT_ID/$_SERVICE_NAME

steps:
  # 1. Build the Docker image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=$_IMAGE:$SHORT_SHA
      - --tag=$_IMAGE:latest
      - --file=Dockerfile
      - .

  # 2. Push image to Container Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - $_IMAGE

  # 3. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=60
      - --set-env-vars=LLM_MODEL=gpt-4o-mini,EMBEDDING_MODEL=text-embedding-3-small,REFRESH_INTERVAL_MINUTES=30,TOP_K=5,CHROMA_PERSIST_DIR=/data/chroma
      - --set-secrets=WEBHOOK_SECRET=webhook-secret:latest,OPENAI_API_KEY=openai-api-key:latest
      - --project=$PROJECT_ID

images:
  - $_IMAGE:$SHORT_SHA
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
