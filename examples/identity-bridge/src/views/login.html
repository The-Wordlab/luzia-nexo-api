<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Partner Login - Identity Bridge Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
    input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; outline: none; }
    input:focus { border-color: #4264FC; }
    .hint { color: #888; font-size: 12px; margin-top: 6px; }
    button { width: 100%; padding: 14px; background: #4264FC; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    button:hover { background: #3554d4; }
    .error { color: #dc2626; font-size: 13px; margin-top: 8px; }
    .badge { display: inline-block; background: #f0f0f0; color: #666; font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Identity Bridge Example</div>
    <h1>Partner Login</h1>
    <p class="subtitle">Enter your phone number to sign in.</p>
    <form method="POST" action="/auth/request-code">
      <label for="phone">Phone number (E.164)</label>
      <input type="tel" id="phone" name="phone" placeholder="+34612345678" required>
      <p class="hint">International format with country code. We'll send a verification code.</p>
      {{error}}
      <button type="submit">Send verification code</button>
    </form>
    <p style="text-align: center; margin-top: 16px; font-size: 12px; color: #999;">
      Demo: OTP code is always <strong>123456</strong>
    </p>
  </div>
</body>
</html>
