# Partner webhook examples — one `docker compose up` to run all services.
#
# Port mapping:
#   8080  minimal    — echo server, basic signature verification
#   8081  structured — locale-aware greetings + card hints
#   8082  advanced   — connector actions, idempotency, failure/retry
#   8090  news-rag   — RSS-backed RAG (pgvector)
#   8091  sports-rag — Sports RSS + match data RAG (pgvector)
#   8092  travel-rag — Travel destination + blog RAG (pgvector)
#
# Copy .env.example to .env and fill in API keys before starting.

services:
  pgvector:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: nexo_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexo_rag"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minimal:
    build:
      context: ./webhook/minimal/python
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/openapi.json')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  structured:
    build:
      context: ./webhook/structured/python
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/openapi.json')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  advanced:
    build:
      context: ./webhook/advanced/python
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/openapi.json')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  news-rag:
    build:
      context: ./webhook/news-rag/python
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      LLM_MODEL: "${LLM_MODEL:-vertex_ai/gemini-2.5-flash}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-vertex_ai/text-embedding-004}"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-}"
      GOOGLE_CLOUD_LOCATION: "${GOOGLE_CLOUD_LOCATION:-europe-west1}"
      VERTEXAI_PROJECT: "${VERTEXAI_PROJECT:-}"
      VERTEXAI_LOCATION: "${VERTEXAI_LOCATION:-}"
      NEWS_FEEDS: "${NEWS_FEEDS:-}"
      REFRESH_INTERVAL_MINUTES: "${REFRESH_INTERVAL_MINUTES:-30}"
      TOP_K: "${TOP_K:-5}"
      VECTOR_STORE_BACKEND: "${VECTOR_STORE_BACKEND:-pgvector}"
      VECTOR_STORE_DURABLE: "${VECTOR_STORE_DURABLE:-true}"
      PGVECTOR_DSN: "${PGVECTOR_DSN:-postgresql://postgres:postgres@pgvector:5432/nexo_rag}"
      PGVECTOR_SCHEMA: "${PGVECTOR_SCHEMA_NEWS:-rag_news}"
    depends_on:
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  sports-rag:
    build:
      context: ./webhook/sports-rag/python
      dockerfile: Dockerfile
    ports:
      - "8091:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      LLM_MODEL: "${LLM_MODEL:-vertex_ai/gemini-2.5-flash}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-vertex_ai/text-embedding-004}"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-}"
      GOOGLE_CLOUD_LOCATION: "${GOOGLE_CLOUD_LOCATION:-europe-west1}"
      VERTEXAI_PROJECT: "${VERTEXAI_PROJECT:-}"
      VERTEXAI_LOCATION: "${VERTEXAI_LOCATION:-}"
      SPORT_FEEDS: "${SPORT_FEEDS:-}"
      FOOTBALL_DATA_API_KEY: "${FOOTBALL_DATA_API_KEY:-}"
      FOOTBALL_DATA_COMPETITION: "${FOOTBALL_DATA_COMPETITION:-PL}"
      REFRESH_INTERVAL_MINUTES: "${REFRESH_INTERVAL_MINUTES:-15}"
      VECTOR_STORE_BACKEND: "${VECTOR_STORE_BACKEND:-pgvector}"
      VECTOR_STORE_DURABLE: "${VECTOR_STORE_DURABLE:-true}"
      PGVECTOR_DSN: "${PGVECTOR_DSN:-postgresql://postgres:postgres@pgvector:5432/nexo_rag}"
      PGVECTOR_SCHEMA: "${PGVECTOR_SCHEMA_SPORTS:-rag_sports}"
    depends_on:
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  travel-rag:
    build:
      context: ./webhook/travel-rag/python
      dockerfile: Dockerfile
    ports:
      - "8092:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      LLM_MODEL: "${LLM_MODEL:-vertex_ai/gemini-2.5-flash}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-vertex_ai/text-embedding-004}"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-}"
      GOOGLE_CLOUD_LOCATION: "${GOOGLE_CLOUD_LOCATION:-europe-west1}"
      VERTEXAI_PROJECT: "${VERTEXAI_PROJECT:-}"
      VERTEXAI_LOCATION: "${VERTEXAI_LOCATION:-}"
      TRAVEL_FEEDS: "${TRAVEL_FEEDS:-}"
      REFRESH_INTERVAL_MINUTES: "${REFRESH_INTERVAL_MINUTES:-60}"
      TOP_K: "${TOP_K:-4}"
      STREAMING_ENABLED: "${STREAMING_ENABLED:-false}"
      VECTOR_STORE_BACKEND: "${VECTOR_STORE_BACKEND:-pgvector}"
      VECTOR_STORE_DURABLE: "${VECTOR_STORE_DURABLE:-true}"
      PGVECTOR_DSN: "${PGVECTOR_DSN:-postgresql://postgres:postgres@pgvector:5432/nexo_rag}"
      PGVECTOR_SCHEMA: "${PGVECTOR_SCHEMA_TRAVEL:-rag_travel}"
    depends_on:
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

