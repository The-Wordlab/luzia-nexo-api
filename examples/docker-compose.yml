# Partner webhook examples — one `docker compose up` to run all services.
#
# Port mapping:
#   8080  minimal    — echo server, basic signature verification
#   8081  structured — locale-aware greetings + card hints
#   8082  advanced   — connector actions, idempotency, failure/retry
#   8090  news-rag   — RSS-backed RAG with ChromaDB
#   8091  sports-rag — Sports RSS + match data RAG with ChromaDB
#   8092  travel-rag — Travel destination + blog RAG with ChromaDB
#   8093  football-live — Live football scores/standings/scorers RAG
#
# Copy .env.example to .env and fill in API keys before starting.

services:
  minimal:
    build:
      context: ./webhook/minimal/python
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/openapi.json')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  structured:
    build:
      context: ./webhook/structured/python
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/openapi.json')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  advanced:
    build:
      context: ./webhook/advanced/python
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/openapi.json')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  news-rag:
    build:
      context: ./webhook/news-rag/python
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      LLM_MODEL: "${LLM_MODEL:-ollama/llama3.2}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"
      NEWS_FEEDS: "${NEWS_FEEDS:-}"
      REFRESH_INTERVAL_MINUTES: "${REFRESH_INTERVAL_MINUTES:-30}"
      TOP_K: "${TOP_K:-5}"
      CHROMA_PERSIST_DIR: "/data/chroma"
      VECTOR_STORE_BACKEND: "${VECTOR_STORE_BACKEND:-chroma}"
      VECTOR_STORE_DURABLE: "${VECTOR_STORE_DURABLE:-false}"
    volumes:
      - news-rag-chroma:/data/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  sports-rag:
    build:
      context: ./webhook/sports-rag/python
      dockerfile: Dockerfile
    ports:
      - "8091:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      LLM_MODEL: "${LLM_MODEL:-ollama/llama3.2}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"
      SPORT_FEEDS: "${SPORT_FEEDS:-}"
      FOOTBALL_DATA_API_KEY: "${FOOTBALL_DATA_API_KEY:-}"
      FOOTBALL_DATA_COMPETITION: "${FOOTBALL_DATA_COMPETITION:-PL}"
      REFRESH_INTERVAL_MINUTES: "${REFRESH_INTERVAL_MINUTES:-15}"
      CHROMA_PERSIST_DIR: "/data/chroma"
      VECTOR_STORE_BACKEND: "${VECTOR_STORE_BACKEND:-chroma}"
      VECTOR_STORE_DURABLE: "${VECTOR_STORE_DURABLE:-false}"
    volumes:
      - sports-rag-chroma:/data/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  travel-rag:
    build:
      context: ./webhook/travel-rag/python
      dockerfile: Dockerfile
    ports:
      - "8092:8080"
    environment:
      PORT: "8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      LLM_MODEL: "${LLM_MODEL:-ollama/llama3.2}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"
      TRAVEL_FEEDS: "${TRAVEL_FEEDS:-}"
      REFRESH_INTERVAL_MINUTES: "${REFRESH_INTERVAL_MINUTES:-60}"
      TOP_K: "${TOP_K:-4}"
      CHROMA_PERSIST_DIR: "/data/chroma"
      STREAMING_ENABLED: "${STREAMING_ENABLED:-false}"
      VECTOR_STORE_BACKEND: "${VECTOR_STORE_BACKEND:-chroma}"
      VECTOR_STORE_DURABLE: "${VECTOR_STORE_DURABLE:-false}"
    volumes:
      - travel-rag-chroma:/data/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  football-live:
    build:
      context: ./webhook/football-live/python
      dockerfile: Dockerfile
    ports:
      - "8093:8003"
    environment:
      FOOTBALL_DATA_API_KEY: "${FOOTBALL_DATA_API_KEY:-}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      STREAMING_ENABLED: "${STREAMING_ENABLED:-true}"
      REFRESH_INTERVAL: "${REFRESH_INTERVAL:-300}"
      TOP_K: "${TOP_K:-5}"
      CHROMA_PERSIST_DIR: "/data/chroma"
      VECTOR_STORE_BACKEND: "${VECTOR_STORE_BACKEND:-chroma}"
      VECTOR_STORE_DURABLE: "${VECTOR_STORE_DURABLE:-false}"
    volumes:
      - football-live-chroma:/data/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

volumes:
  news-rag-chroma:
  sports-rag-chroma:
  travel-rag-chroma:
  football-live-chroma:
